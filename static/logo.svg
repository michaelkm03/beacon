<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 68" fill="none">
  <style>
    @keyframes hs-glow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(110,231,183,0.45)); }
      50%       { filter: drop-shadow(0 0 14px rgba(110,231,183,0.95)) drop-shadow(0 0 28px rgba(110,231,183,0.3)); }
    }
    .hs { animation: hs-glow 2.8s ease-in-out infinite; }
  </style>
  <g class="hs">
    <!-- depth shadow -->
    <polyline points="6,66 25,36 36,49 59,18 70,29 79,19"
      stroke="#1a5c3a" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="88,9 83,23 74,15" fill="#1a5c3a"/>
    <!-- main -->
    <polyline points="3,63 22,33 33,46 56,15 67,26 76,16"
      stroke="#6ee7b7" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="85,6 80,20 71,12" fill="#6ee7b7"/>
  </g>
</svg>
